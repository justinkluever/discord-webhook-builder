name: Formats

on: ['push', 'pull_request']

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - '.github/workflows/formats.yml'
              - '**/*.php'
              - '**/*.json'
              - '*.dist'
              - 'composer.lock'
  ci:
    needs: changes
    if: needs.changes.outputs.src == 'true' && (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    name: Formats P8.5 - ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup PHP
      uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
      with:
        php-version: 8.5
        extensions: dom, mbstring, zip
        coverage: pcov

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: dependencies-php-8.5-os-ubuntu-latest-composer-${{ hashFiles('composer.json') }}
        restore-keys: dependencies-php-8.5-os-ubuntu-latest-composer-

    - name: Install Composer dependencies
      run: composer update --prefer-stable --no-interaction --prefer-dist

    - name: Coding Style Checks
      run: composer test:lint

    - name: Type Checks
      run: composer test:types

    - name: Type Coverage Checks
      run: composer test:type-coverage

    - name: Refactor Checks
      run: composer test:refactor
